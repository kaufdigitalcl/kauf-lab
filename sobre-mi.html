<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sobre mi | kauf.lab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: min(100%, 620px);
      text-align: left;
    }

    .eyebrow {
      color: #555;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.4rem;
    }

    h1 {
      color: #c0c0c0;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    span.highlight {
      color: #ffffff;
      font-weight: 700;
    }

    .cv {
      display: grid;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .item {
      display: grid;
      grid-template-columns: 8.5rem 1fr;
      gap: 1rem;
      border-top: 1px solid #1f1f1f;
      padding-top: 1rem;
    }

    .label {
      color: #555;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .value {
      color: #c0c0c0;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .value strong {
      color: #ffffff;
      font-weight: 700;
    }

    .dot {
      display: block;
      width: 6px;
      height: 6px;
      background: #ffffff;
      border-radius: 50%;
      opacity: 0.3;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      width: 100%;
      text-align: center;
      left: 0;
    }

    footer a {
      color: #555;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: #e8e8e8;
    }

    .sep {
      color: #333;
      font-size: 0.75rem;
      margin: 0 0.6rem;
    }

    @media (max-width: 560px) {
      body {
        align-items: flex-start;
        padding: 3rem 1.25rem 5rem;
      }

      .item {
        grid-template-columns: 1fr;
        gap: 0.35rem;
      }

      h1 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <p class="eyebrow">mini cv</p>

    <h1>
      hola, soy <span class="highlight">Nico</span><br>
      creo automatizaciones en <span class="highlight">kauf.digital</span>
    </h1>

    <section class="cv" aria-label="Mini CV">
      <div class="item">
        <p class="label">nombre</p>
        <p class="value"><strong>Nico</strong></p>
      </div>

      <div class="item">
        <p class="label">empresa</p>
        <p class="value"><strong>kauf.digital</strong></p>
      </div>

      <div class="item">
        <p class="label">enfoque</p>
        <p class="value">
          Automatizacion de ventas con IA para clinicas, gimnasios e inmobiliarias.
        </p>
      </div>
    </section>

    <span class="dot"></span>
  </main>

  <footer>
    <a href="index.html">inicio</a>
    <span class="sep">·</span>
    <a href="https://www.linkedin.com/in/nicolas-cardenas-9907263b3/" target="_blank" rel="noopener">linkedin</a>
    <span class="sep">·</span>
    <a href="https://www.instagram.com/kauf.digital/" target="_blank" rel="noopener">instagram</a>
    <span class="sep">·</span>
    <a href="https://wa.me/56939080297" target="_blank" rel="noopener">whatsapp</a>
  </footer>
</body>
</html>
