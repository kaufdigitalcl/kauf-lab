<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kauf.lab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      line-height: 2;
      color: #c0c0c0;
    }

    span.highlight {
      color: #ffffff;
      font-weight: 700;
    }

    .dot {
      display: block;
      width: 6px;
      height: 6px;
      background: #ffffff;
      border-radius: 50%;
      margin: 2rem auto 0;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      hola, soy <span class="highlight">nico</span><br>
      esto es mi <span class="highlight">laboratorio</span><br>
      y soy <span class="highlight">bakana</span>
    </h1>
    <span class="dot"></span>
  </div>
</body>
</html>
